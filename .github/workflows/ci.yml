# Task 51: CI (GitHub Actions).
#
# Single Qt6 build+test job, no matrix -- global constraint 1 (phase8-
# global-constraints.md): Qt5/Ubuntu Touch/Clickable support was dropped
# outright, so there is exactly one build path to verify here.
#
# --- Why this isn't a plain `apt-get install` against stock ubuntu-24.04 ---
#
# The task brief's step 2 assumes KF6 dev packages (libkf6kirigami2-dev,
# libkf6notifications-dev, libkf6dbusaddons-dev, libkf6i18n-dev) are
# available straight from Ubuntu 24.04 "noble"'s own archives. Verified
# directly against packages.ubuntu.com (2026-07-15) that none of the four
# exist for the noble suite at all (not even in universe) -- confirmed via
# https://packages.ubuntu.com/search?keywords=<pkg>&searchon=names&suite=noble
# returning "Sorry, your search gave no results" for each. qt6keychain-dev
# (as named in the brief) doesn't exist under that name on any Ubuntu suite
# either. Cross-checked the Kubuntu Backports PPA
# (https://launchpad.net/~kubuntu-ppa/+archive/ubuntu/backports), which does
# carry kf6-kirigami/kf6-knotifications/etc. packages -- but its package
# listing is published for "questing" (25.10) and "jammy" (22.04) only, with
# no noble target, i.e. even Kubuntu's own KF6 backport effort skips 24.04.
# KDE's own upstream CI (invent.kde.org/sysadmin/ci-images) builds KF6
# software against a rolling openSUSE Tumbleweed image (suse-qt611/
# suse-qt612), not any Ubuntu LTS, for the same underlying reason: noble
# predates KF6's Feb-2024 stable packaging landing anywhere in Ubuntu's own
# archives.
#
# What *does* carry current, noble-built KF6/Qt6 packages: KDE neon's own
# "user" apt archive (https://archive.neon.kde.org/user), which targets
# `noble` directly (confirmed: archive.neon.kde.org/user/dists/noble/ exists
# and is actively updated) because neon layers current KDE software on top
# of the current Ubuntu LTS by design. Fetched and inspected its Packages
# index directly (archive.neon.kde.org/user/dists/noble/main/binary-amd64/
# Packages.gz) and confirmed every package this project's CMakeLists.txt
# actually needs is present there for noble: extra-cmake-modules,
# qt6-base-dev (bundles Core/Network/Sql/Test/DBus -- confirmed no separate
# -dev split package exists for those submodules), qt6-declarative-dev
# (bundles Qml/Quick/QuickControls2), qt6-webengine-dev,
# libqt6sql6-sqlite (runtime SQLite driver plugin the DAO tests open a real
# database through), libkf6kirigami2-dev, libkf6notifications-dev,
# libkf6dbusaddons-dev, libkf6i18n-dev, kunifiedpush-dev, and -- under a
# different name than the brief guessed -- qtkeychain-qt6-dev (Qt6Keychain
# 0.16.0 in this archive as of this check; the Flatpak manifate
# `packaging/flatpak/com.urlxl.mail.json` separately pins 0.17.0 for
# its from-source build, a different mechanism for a different
# distribution channel -- 0.16 vs 0.17 is not an ABI/API-breaking gap for
# the calls SecureStoreKeychain.cpp makes).
#
# This job therefore adds neon's "user" archive on top of the stock
# ubuntu-24.04 runner image (its own main/universe repos stay enabled and
# still supply the non-KDE build dependencies) rather than switching to a
# container: block on a KDE-maintained image -- no Ubuntu-24.04-based
# KDE CI container was found to exist (KDE's Docker Hub `kdeorg/ci-*`
# images are 2-3 years stale, Qt 6.4/6.5, openSUSE-based, last published
# 2023; invent.kde.org's current sysadmin/ci-images `suse-qt611`/
# `suse-qt612` are openSUSE Tumbleweed-based, and its one Ubuntu-family
# image, `kubuntu-resolute-lts`, targets 25.10 "Resolute" and is a VM
# image, not a pullable container). Layering neon's real, noble-targeted
# apt archive keeps this job an honest, plain `apt-get install` flow -- just
# with one extra repository added first -- rather than fabricating package
# names against noble's own archives or guessing at a container tag.
#
# Residual uncertainty (this could only be fully confirmed by an actual run,
# see task-51-report.md): whether apt dependency resolution across the
# combined ubuntu-24.04 + neon archives resolves cleanly end-to-end on a
# fresh GitHub-hosted runner (neon's qt6-base-dev carries `Breaks/Replaces`
# against older stock Qt6 packages, which is standard for how neon users
# upgrade, but this project has never exercised that combination inside
# GitHub's specific runner image before); and whether every -dev package's
# CMake config target name lines up 1:1 with what this project's
# CMakeLists.txt calls (e.g. `find_package(KUnifiedPush REQUIRED)`,
# `find_package(Qt6Keychain REQUIRED)`) -- highly likely since these are the
# same upstream projects' own CMake exports repackaged, not KDE/neon
# inventions, but not something inspecting a Packages index can prove.
#
# Update 2026-07-18: this job started failing at Configure once the PGP QR
# key exchange feature landed (`find_package(ZXing CONFIG REQUIRED)` and
# `find_package(Qt6 REQUIRED COMPONENTS Multimedia)` in app/CMakeLists.txt)
# -- neither dependency was ever added to the apt list below when that
# feature was added, and the gap wasn't caught locally because the
# developer's own machine already had a suitable system zxing-cpp. Root
# cause confirmed with a real ubuntu:24.04 Docker rebuild of this exact job:
# qt6-multimedia-dev closes the Qt6Multimedia gap (added to the neon archive
# alongside the rest of this job's Qt packages, version-matched at 6.11.1),
# but no apt package closes the ZXing gap the same way -- Ubuntu noble's own
# libzxing-dev is 2.2.1-3, whose headers predate CreateBarcode.h/
# WriteBarcode.h that PgpQrController.cpp uses (confirmed by extracting that
# .deb directly), and neon's archive doesn't package zxing-cpp at all. This
# project already solved that exact gap for the Flatpak manifest
# (packaging/flatpak/com.urlxl.mail.json) by building zxing-cpp v3.1.0 from
# source, so this job now does the same (see the dedicated step below) --
# simplified since, unlike flatpak-builder's network-isolated build phase,
# this runner has network access throughout, so ZXING_DEPENDENCIES' default
# AUTO setting can fetch the `stb` single-header dependency itself.
#
# Update 2026-07-18 (2): same class of gap, this time for the system tray
# feature (`find_package(KF6StatusNotifierItem REQUIRED)` in
# app/CMakeLists.txt, added by TrayController) -- again not caught locally
# because the developer's machine already had it installed. Confirmed via
# the failing run's log that Configure fails looking for
# KF6StatusNotifierItemConfig.cmake. Unlike the ZXing gap, neon's archive
# does carry this one: `kf6-kstatusnotifieritem-dev` (verified against
# archive.neon.kde.org/user/dists/noble/main/binary-amd64/Packages.gz),
# version-matched at 6.28.0 like the other KF6 packages already in this
# list -- note it doesn't follow their `libkf6*-dev` naming pattern.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # flatpak-build below is gated to these two trigger types only (see its
  # own `if:` condition) -- a real flatpak-builder run is minutes, not the
  # hours once feared before base/base-version replaced a from-source
  # WebEngine rebuild (see packaging/flatpak/com.urlxl.mail.json's own
  # comments), but it still downloads a real Flathub extension + SDK and
  # isn't worth the latency/flakiness surface on every push/PR that
  # build-and-test above already covers.
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * *" # nightly, arbitrary off-peak time

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # Layer KDE neon's "user" apt archive on top of the stock noble repos
      # -- see the file-level comment above for why this is necessary (no
      # KF6 packages exist in Ubuntu 24.04's own archives at all).
      - name: Add KDE neon apt archive (KF6/Qt6 packages for noble)
        run: |
          sudo install -d -m 0755 /etc/apt/keyrings
          curl -fsSL https://archive.neon.kde.org/public.key | sudo gpg --dearmor -o /etc/apt/keyrings/neon-archive.gpg
          echo "deb [signed-by=/etc/apt/keyrings/neon-archive.gpg] https://archive.neon.kde.org/user noble main" \
            | sudo tee /etc/apt/sources.list.d/neon.list

      # Full dependency list cross-checked against this repo's own
      # CMakeLists.txt (root, app/, core/, tests/) -- see the file-level
      # comment above for the per-package provenance/verification notes.
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            ninja-build \
            gettext \
            qt6-base-dev \
            qt6-declarative-dev \
            qt6-webengine-dev \
            qt6-multimedia-dev \
            libqt6sql6-sqlite \
            libkf6kirigami2-dev \
            libkf6notifications-dev \
            libkf6dbusaddons-dev \
            libkf6i18n-dev \
            kf6-kstatusnotifieritem-dev \
            qtkeychain-qt6-dev \
            kunifiedpush-dev

      # ZXing (zxing-cpp) backs the PGP QR key exchange feature's
      # encode/decode (app/pgp/PgpQrController.cpp, app/pgp/PgpQrScanner.cpp
      # -- app/CMakeLists.txt's `find_package(ZXing CONFIG REQUIRED)`). Not
      # installable via apt here: Ubuntu noble's universe archive only
      # carries libzxing-dev 2.2.1-3, whose headers predate
      # CreateBarcode.h/WriteBarcode.h (confirmed by inspecting that .deb's
      # contents directly -- neither file is present), and KDE neon's "user"
      # archive added above doesn't package zxing-cpp at all. Built from
      # source instead, pinned to the same v3.1.0 tag/commit the Flatpak
      # manifest (packaging/flatpak/com.urlxl.mail.json) already builds for
      # the identical reason -- see that manifest's own comments for the
      # version research. Unlike that manifest's sandboxed, network-isolated
      # build phase, this runner has network access throughout, so the
      # default ZXING_DEPENDENCIES=AUTO can fetch the `stb` single-header
      # dependency itself; no need to vendor it or force LOCAL.
      - name: Build zxing-cpp (ZXing) from source
        run: |
          git clone --recurse-submodules --branch v3.1.0 --depth 1 \
            https://github.com/zxing-cpp/zxing-cpp.git /tmp/zxing-cpp
          cmake -B /tmp/zxing-cpp/build -S /tmp/zxing-cpp -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DZXING_READERS=ON \
            -DZXING_WRITERS=ON \
            -DZXING_EXAMPLES=OFF \
            -DZXING_UNIT_TESTS=OFF \
            -DCMAKE_DISABLE_FIND_PACKAGE_Doxygen=ON
          cmake --build /tmp/zxing-cpp/build
          sudo cmake --install /tmp/zxing-cpp/build

      - name: Configure
        run: cmake -B build -S . -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      # All test binaries use QTEST_APPLESS_MAIN/QTEST_GUILESS_MAIN (verified
      # against tests/CMakeLists.txt and every tests/**/*Test.cpp -- none use
      # QTEST_MAIN/a real QGuiApplication), so no Xvfb/offscreen QPA platform
      # setup is needed here. SecureStoreKeychainTest and
      # NotificationDispatcherTest are the two tests that touch D-Bus-backed
      # system services (Secret Service, KNotification); both are already
      # written to tolerate a session with no such service reachable
      # (SecureStoreKeychainTest QSKIPs when the Secret Service write fails;
      # NotificationDispatcherTest only exercises the pure
      # pickTitle()/pickText() helpers, never notify() itself) -- consistent
      # with global constraint 9 (no live backend, no local KDE Wallet/D-Bus
      # session required).
      - name: Test
        run: ctest --test-dir build --output-on-failure

  # --- flatpak-builder validation job ---
  #
  # Previously omitted entirely: packaging/flatpak/com.urlxl.mail.json used
  # to fail deterministically at the kypost module's CMake configure step
  # (Could NOT find Qt6WebEngineQuick), and a job that fails on literally
  # every push/PR is worse than no job. Resolved 2026-07-17 (see
  # TESTING.md's flatpak-builder checklist item and the manifest's own
  # comments for the full fix + real from-scratch build+launch confirmation)
  # -- the manifest now produces a working app. Still not run on every
  # push/pull_request though: even without a from-source WebEngine rebuild,
  # a real flatpak-builder run downloads a ~600MB SDK/base-app/runtime set
  # and takes minutes, which is real latency/flakiness surface routine PRs
  # shouldn't pay -- gated to manual (workflow_dispatch) and nightly
  # (schedule) triggers only, matching this file's own `on:` block.
  flatpak-build:
    runs-on: ubuntu-24.04
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Install flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Build Flatpak manifest
        run: |
          flatpak-builder --user --force-clean --install-deps-from=flathub \
            build-flatpak packaging/flatpak/com.urlxl.mail.json

      # Confirms the built app actually loads/runs inside the sandbox, not
      # just that flatpak-builder's install step succeeded -- catches
      # QML-resource-registration gaps (a real one: a component missing from
      # qml/qml.qrc) that a clean build alone wouldn't surface.
      - name: Launch smoke test
        run: |
          timeout 15 flatpak-builder --run build-flatpak \
            packaging/flatpak/com.urlxl.mail.json kypost --platform offscreen 2>&1 | tee launch.log
          if grep -qi "is not a type\|unavailable\|QQmlApplicationEngine failed" launch.log; then
            echo "QML load failure detected in launch output" >&2
            exit 1
          fi
